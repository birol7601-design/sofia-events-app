<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="hg" cx="30%" cy="22%" r="90%">
      <stop offset="0%"   stop-color="#FFF7C0"/>
      <stop offset="28%"  stop-color="#FFE45C"/>
      <stop offset="58%"  stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#D87A00"/>
    </radialGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="48%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Honey hexagon -->
  <polygon points="50,2 96,26 96,74 50,98 4,74 4,26" fill="url(#hg)"/>
  <!-- Gloss highlight (top half) -->
  <polygon points="50,2 96,26 96,50 50,50 4,50 4,26" fill="url(#gl)"/>
  <!-- Inset edge (dark amber rim at bottom) -->
  <polygon points="50,2 96,26 96,74 50,98 4,74 4,26" fill="none" stroke="rgba(122,61,0,0.35)" stroke-width="2"/>

  <!-- Left wing -->
  <ellipse cx="31" cy="47" rx="13" ry="7" fill="rgba(255,255,255,0.78)" transform="rotate(-28 31 47)"/>
  <!-- Right wing -->
  <ellipse cx="69" cy="47" rx="13" ry="7" fill="rgba(255,255,255,0.78)" transform="rotate(28 69 47)"/>

  <!-- Bee head -->
  <circle cx="50" cy="40" r="9" fill="#1E0900"/>
  <!-- Eyes (tiny) -->
  <circle cx="46" cy="38" r="1.8" fill="#FFB800"/>
  <circle cx="54" cy="38" r="1.8" fill="#FFB800"/>

  <!-- Antennae -->
  <line x1="46" y1="32" x2="40" y2="22" stroke="#1E0900" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="54" y1="32" x2="60" y2="22" stroke="#1E0900" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="40" cy="21" r="2.5" fill="#FFB800"/>
  <circle cx="60" cy="21" r="2.5" fill="#FFB800"/>

  <!-- Bee body -->
  <ellipse cx="50" cy="63" rx="10" ry="15" fill="#1E0900"/>
  <!-- Honey stripe -->
  <rect x="41" y="58" width="18" height="5" rx="2.5" fill="#FFB800"/>
  <!-- Stinger -->
  <polygon points="50,77 53,83 47,83" fill="#1E0900"/>
</svg>
