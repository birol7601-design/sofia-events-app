name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CONVEX_DEPLOYMENT: dev:ci-placeholder
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      NEXT_PUBLIC_CONVEX_URL: https://ci-placeholder.convex.cloud
      RESEND_API_KEY: re_ci_placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
