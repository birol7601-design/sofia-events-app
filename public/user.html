<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background:#0A0912;">
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <button onclick="history.back()" style="background:transparent;border:1px solid rgba(212,175,55,0.4);border-radius:999px;padding:6px 14px;color:#D4AF37;font-family:'IBM Plex Sans',sans-serif;font-size:13px;cursor:pointer;">← Back</button>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main style="padding-bottom:80px;max-width:600px;margin:0 auto;">

    <!-- USER HERO BANNER -->
    <div id="user-hero" style="height:140px;position:relative;background:linear-gradient(135deg,#3A1F6E 0%,#6B2D5C 50%,#1A1040 100%);overflow:hidden;">
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.4;" aria-hidden="true">
        <circle cx="8%"  cy="20%" r="1" fill="#F4D06F"/>
        <circle cx="18%" cy="65%" r="1.5" fill="#F4D06F"/>
        <circle cx="30%" cy="15%" r="1" fill="#D4AF37"/>
        <circle cx="45%" cy="75%" r="1" fill="#F4D06F"/>
        <circle cx="58%" cy="30%" r="1.5" fill="#D4AF37"/>
        <circle cx="70%" cy="55%" r="1" fill="#F4D06F"/>
        <circle cx="80%" cy="20%" r="1" fill="#D4AF37"/>
        <circle cx="88%" cy="70%" r="1.5" fill="#F4D06F"/>
        <circle cx="95%" cy="40%" r="1" fill="#D4AF37"/>
      </svg>
      <div id="user-hero-watermark" style="position:absolute;bottom:10px;right:12px;font-family:'Playfair Display',serif;font-size:60px;font-weight:700;color:#D4AF37;opacity:0.06;line-height:1;pointer-events:none;white-space:nowrap;overflow:hidden;max-width:90%;"></div>
    </div>

    <!-- AVATAR + INFO -->
    <div id="user-info" style="text-align:center;padding:0 20px 16px;border-bottom:1px solid rgba(212,175,55,0.15);">
      <div style="position:relative;display:inline-flex;margin-top:-36px;z-index:2;">
        <div id="user-avatar" style="width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid #0A0912;box-shadow:0 0 0 2px #D4AF37;"></div>
        <div style="position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#D4AF37;color:#0A0912;display:flex;align-items:center;justify-content:center;font-size:9px;">✦</div>
      </div>
      <h2 id="user-username" style="font-family:'Playfair Display',serif;color:#F0E8D6;font-size:22px;font-weight:700;margin:10px 0 4px;"></h2>
      <p id="user-bio" style="font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#6E6A5F;line-height:1.5;"></p>

      <!-- FRIEND ACTION BUTTONS -->
      <div id="friend-actions" style="display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap;"></div>
    </div>

    <!-- PRIVATE MESSAGE -->
    <div id="private-msg" style="display:none;text-align:center;padding:60px 20px;">
      <div style="font-size:32px;margin-bottom:12px;">🔒</div>
      <p style="font-family:'IBM Plex Sans',sans-serif;color:#6E6A5F;font-size:14px;">This profile is private.</p>
    </div>

    <!-- TABS (shown only for public profiles) -->
    <div id="user-tabs-wrap" style="display:none;">
      <div class="tab-switcher" style="margin-top:16px;">
        <button class="tab-btn active" id="utab-saved-btn" onclick="switchUserTab('saved')">Saved</button>
        <button class="tab-btn" id="utab-attending-btn" onclick="switchUserTab('attending')">Attending</button>
      </div>
      <div id="user-saved-list" class="event-list" style="padding:0;"></div>
      <div id="user-attending-list" class="event-list" style="padding:0;display:none;"></div>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="saved.html" class="nav-item" id="nav-saved"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span></a>
    <a href="messages.html" class="nav-item" id="nav-messages" style="position:relative;"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
    <a href="home.html" class="nav-item" id="nav-home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="organizer.html" class="nav-item" id="nav-organizers"><span class="nav-icon">🎭</span><span class="nav-label">Organizers</span></a>
    <a href="profile.html" class="nav-item" id="nav-profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  <script src="avatars.js"></script>
  <script src="user.js"></script>
  <script src="nav-badge.js"></script>
</body>
</html>
