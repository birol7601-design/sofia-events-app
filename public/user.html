<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background:#0A0912;">
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <button onclick="history.back()" style="background:transparent;border:1px solid rgba(212,175,55,0.4);border-radius:999px;padding:6px 14px;color:#D4AF37;font-family:'IBM Plex Sans',sans-serif;font-size:13px;cursor:pointer;">← Back</button>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main style="padding-bottom:70px;max-width:600px;margin:0 auto;">

    <!-- USER HERO -->
    <div id="user-hero" style="position:relative;background:linear-gradient(135deg,#1A1625,#0A0912);padding:32px 20px 24px;text-align:center;border-bottom:1px solid rgba(212,175,55,0.2);">
      <div id="user-avatar" style="width:72px;height:72px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;font-family:'IBM Plex Sans',sans-serif;border:2px solid #D4AF37;background:#D4AF37;color:#0A0912;"></div>
      <h2 id="user-username" style="font-family:'Playfair Display',serif;color:#F0E8D6;font-size:22px;font-weight:700;margin-bottom:4px;"></h2>
      <p id="user-bio" style="font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#6E6A5F;line-height:1.5;"></p>
    </div>

    <!-- PRIVATE MESSAGE -->
    <div id="private-msg" style="display:none;text-align:center;padding:60px 20px;">
      <div style="font-size:32px;margin-bottom:12px;">🔒</div>
      <p style="font-family:'IBM Plex Sans',sans-serif;color:#6E6A5F;font-size:14px;">This profile is private.</p>
    </div>

    <!-- TABS (shown only for public profiles) -->
    <div id="user-tabs-wrap" style="display:none;">
      <div class="tab-switcher" style="margin-top:16px;">
        <button class="tab-btn active" id="utab-saved-btn" onclick="switchUserTab('saved')">Saved</button>
        <button class="tab-btn" id="utab-attending-btn" onclick="switchUserTab('attending')">Attending</button>
      </div>
      <div id="user-saved-list" class="event-list" style="padding:0;"></div>
      <div id="user-attending-list" class="event-list" style="padding:0;display:none;"></div>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="profile.html?tab=saved" class="nav-item" id="nav-saved">
      <span class="nav-icon">🔖</span>
      <span class="nav-label">Saved</span>
    </a>
    <a href="organizer.html" class="nav-item" id="nav-organizers">
      <span class="nav-icon">🎭</span>
      <span class="nav-label">Organizers</span>
    </a>
    <a href="profile.html" class="nav-item" id="nav-profile">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </a>
  </nav>

  <script src="user.js"></script>
</body>
</html>
