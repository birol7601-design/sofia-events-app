<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" fill="url(#sg)"/>
            <path d="M20 8L20 32M8 20L32 20M11.5 11.5L28.5 28.5M28.5 11.5L11.5 28.5" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="5" fill="#1A0A00"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">Buzz</span>
          <span class="header-slogan">Find your night</span>
        </div>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main class="page-transition" style="padding:60px 14px;max-width:480px;margin:0 auto;text-align:center;">
    <div id="verifying">
      <div style="font-size:48px;margin-bottom:16px;">✉️</div>
      <p style="font-family:'Cormorant Garamond',serif;font-size:18px;color:#C7A880;font-style:italic;">Verifying your email…</p>
    </div>
    <div id="success" style="display:none;">
      <div style="font-size:64px;margin-bottom:16px;">✨</div>
      <h1 style="font-family:'DM Serif Display',serif;font-style:italic;color:#FF8C00;font-size:28px;margin:0 0 8px;">Email verified!</h1>
      <p style="font-family:'Cormorant Garamond',serif;font-size:17px;color:#C7A880;font-style:italic;margin:0 0 28px;">Welcome to SofiaBuzz.</p>
      <a href="home.html" style="display:inline-block;background:linear-gradient(135deg,#FF6B35,#FF8C00,#FFD700);color:#1A0A00;font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:15px;padding:14px 32px;border-radius:999px;text-decoration:none;">Enter →</a>
    </div>
    <div id="error" style="display:none;">
      <div style="font-size:48px;margin-bottom:16px;">❌</div>
      <h2 style="font-family:'DM Serif Display',serif;font-style:italic;color:#FF8C00;font-size:22px;">This link is invalid or expired.</h2>
      <p style="font-family:'Cormorant Garamond',serif;font-size:15px;color:#8B6040;font-style:italic;margin:8px 0 24px;">Try logging in and requesting a new verification link from your profile.</p>
      <a href="auth.html" style="display:inline-block;background:transparent;border:1px solid rgba(255,140,0,0.5);color:#FF8C00;font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:10px 24px;border-radius:999px;text-decoration:none;">← Back to login</a>
    </div>
  </main>

  <script>
    const API = 'https://sofiabuzz.com';
    const token = new URLSearchParams(window.location.search).get('token');

    (async () => {
      if (!token) { document.getElementById('verifying').style.display='none'; document.getElementById('error').style.display=''; return; }
      try {
        const res = await fetch(`${API}/api/users/verify-email/${encodeURIComponent(token)}`);
        document.getElementById('verifying').style.display = 'none';
        if (res.ok) {
          document.getElementById('success').style.display = '';
        } else {
          document.getElementById('error').style.display = '';
        }
      } catch {
        document.getElementById('verifying').style.display = 'none';
        document.getElementById('error').style.display = '';
      }
    })();
  </script>
</body>
</html>
