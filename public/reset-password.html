<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" fill="url(#sg)"/>
            <path d="M20 8L20 32M8 20L32 20M11.5 11.5L28.5 28.5M28.5 11.5L11.5 28.5" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="5" fill="#1A0A00"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">Buzz</span>
          <span class="header-slogan">Find your night</span>
        </div>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main class="page-transition" style="padding:40px 14px 80px;max-width:480px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:48px;margin-bottom:12px;">🔑</div>
      <h1 style="font-family:'DM Serif Display',serif;font-style:italic;color:#FF8C00;font-size:26px;margin:0 0 6px;">Choose a new password</h1>
      <p style="font-family:'Cormorant Garamond',serif;font-size:15px;color:#8B6040;font-style:italic;margin:0;">Enter your new password below.</p>
    </div>

    <div class="section-box">
      <svg class="corner-flourish cf-tl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <svg class="corner-flourish cf-tr" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <svg class="corner-flourish cf-br" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <svg class="corner-flourish cf-bl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <div class="profile-form">
        <input type="password" id="new-password" class="dark-input" placeholder="New password (min 6 chars)">
        <input type="password" id="confirm-password" class="dark-input" placeholder="Confirm new password">
        <button class="gold-btn" id="reset-btn">Reset password</button>
        <p id="reset-msg" style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;min-height:18px;"></p>
      </div>
    </div>
  </main>

  <script>
    const API = 'https://sofiabuzz.com';
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.querySelector('h1').textContent = 'Invalid link';
      document.querySelector('.section-box').style.display = 'none';
    }

    document.getElementById('reset-btn').addEventListener('click', async () => {
      const pwd = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const msg = document.getElementById('reset-msg');
      msg.style.color = '#E8456B'; msg.textContent = '';

      if (pwd.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; return; }
      if (pwd !== confirm) { msg.textContent = 'Passwords do not match.'; return; }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true; btn.textContent = 'Updating…';

      try {
        const res = await fetch(`${API}/api/users/reset-password`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pwd })
        });
        const data = await res.json();
        if (!res.ok) { msg.textContent = data.error || 'Something went wrong.'; return; }
        msg.style.color = '#FF8C00'; msg.textContent = 'Password updated! ✨';
        setTimeout(() => { window.location.href = 'auth.html'; }, 2000);
      } catch { msg.textContent = 'Network error. Try again.'; }
      finally { btn.disabled = false; btn.textContent = 'Reset password'; }
    });
  </script>
</body>
</html>
