<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="detail-page">

  <div id="hero" class="detail-hero">
    <button class="hero-btn hero-back" onclick="history.length > 1 ? history.back() : (location.href='index.html')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <button class="hero-btn hero-save">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
    <div id="featured-badge" class="featured-pill" style="display:none">★ FEATURED EVENT</div>
  </div>

  <div class="detail-info">
    <h1 id="event-title" class="detail-title">Loading…</h1>
    <div id="event-venue" class="detail-meta"></div>
    <div id="event-time" class="detail-meta"></div>
  </div>

  <div class="detail-about">
    <div class="section-label about-label">ABOUT THIS EVENT</div>
    <p id="event-description" class="about-text"></p>
  </div>

  <div class="detail-details">
    <div class="section-label details-label">EVENT DETAILS</div>
    <div id="event-category-badge"></div>
    <a id="ticket-link" class="detail-ticket-link" href="#" target="_blank" rel="noopener" style="display:none">View official ticket page →</a>
  </div>

  <div class="detail-bottom-bar">
    <div class="bottom-price-wrap">
      <span class="price-from">from</span>
      <span id="bottom-price-value" class="bottom-price-value"></span>
    </div>
    <div id="bottom-action"></div>
  </div>

  <script src="event.js"></script>
</body>
</html>
