<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script>if (!localStorage.getItem('userToken')) { window.location.href = 'auth.html'; }</script>
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="sunFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" fill="url(#sunFill)"/>
            <path d="M20 8L20 32M8 20L32 20M11.5 11.5L28.5 28.5M28.5 11.5L11.5 28.5" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="5" fill="#1A0A00"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">Buzz</span>
          <span class="header-slogan">Find your night</span>
        </div>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main class="page-transition" style="padding-bottom:80px;padding-top:4px;">

    <!-- GREETING -->
    <div style="padding:18px 14px 10px;">
      <p id="greeting-time" style="font-family:'DM Serif Display',serif;font-style:italic;font-size:14px;color:var(--muted-dark);margin:0 0 4px;"></p>
      <h1 style="font-family:'DM Serif Display',serif;font-style:italic;font-size:20px;color:var(--cream);margin:0;line-height:1.25;font-weight:400;">What's happening in Sofia?</h1>
    </div>

    <!-- TONIGHT'S HIGHLIGHTS -->
    <div style="padding:0 14px;">
      <p class="section-label">Tonight &amp; this week</p>
    </div>
    <div id="highlights-strip" class="home-highlights-strip" style="padding-left:14px;padding-right:14px;">
      <p style="color:var(--muted-dark);font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:8px 0;">Loading…</p>
    </div>

    <!-- EXPLORE -->
    <div style="padding:4px 14px 0;">
      <p class="section-label" style="margin-top:8px;">Explore</p>

      <div class="hub-all-events" onclick="homeNavigate('index.html')" style="margin-bottom:10px;">
        <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#FF6B35,#FFD700);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🎉</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:16px;color:var(--cream);">All Events</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--muted-dark);">Browse the full feed</div>
        </div>
        <span style="color:var(--gold);font-size:22px;flex-shrink:0;">›</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

        <div class="hub-card" onclick="homeNavigate('profile.html?tab=saved')">
          <div class="hub-badge" id="badge-saved" style="display:none;"></div>
          <div class="hub-card-inner">
            <span style="font-size:26px;">🔖</span>
            <div>
              <div class="hub-card-title">Saved</div>
              <div class="hub-card-sub">Your favourites</div>
            </div>
          </div>
        </div>

        <div class="hub-card" onclick="homeNavigate('messages.html')">
          <div class="hub-badge" id="badge-messages" style="display:none;"></div>
          <div class="hub-card-inner">
            <span style="font-size:26px;">💬</span>
            <div>
              <div class="hub-card-title">Messages</div>
              <div class="hub-card-sub">Chat with friends</div>
            </div>
          </div>
        </div>

        <div class="hub-card" onclick="homeNavigate('profile.html')">
          <div class="hub-card-inner">
            <span style="font-size:26px;">👤</span>
            <div>
              <div class="hub-card-title">Profile</div>
              <div class="hub-card-sub">Your account</div>
            </div>
          </div>
        </div>

        <div class="hub-card" onclick="homeNavigate('organizer.html')">
          <div class="hub-card-inner">
            <span style="font-size:26px;">🎪</span>
            <div>
              <div class="hub-card-title">Organizers</div>
              <div class="hub-card-sub">List your event</div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- GENRE BROWSE -->
    <div style="padding:20px 14px 0;">
      <p class="section-label">Browse by genre</p>
      <div id="genre-browse" style="display:flex;flex-wrap:wrap;gap:8px;padding-bottom:8px;"></div>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="saved.html" class="nav-item" id="nav-saved"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span></a>
    <a href="messages.html" class="nav-item" id="nav-messages" style="position:relative;"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
    <a href="home.html" class="nav-item active" id="nav-home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="organizer.html" class="nav-item" id="nav-organizers"><span class="nav-icon">🎭</span><span class="nav-label">Organizers</span></a>
    <a href="profile.html" class="nav-item" id="nav-profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  <script src="home.js"></script>
</body>
</html>
