<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script>if (!localStorage.getItem('userToken')) { window.location.href = 'auth.html'; }</script>
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="sunFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" fill="url(#sunFill)"/>
            <path d="M20 8L20 32M8 20L32 20M11.5 11.5L28.5 28.5M28.5 11.5L11.5 28.5" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="5" fill="#1A0A00"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">Buzz</span>
          <span class="header-slogan">Find your night</span>
        </div>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main class="page-transition" style="padding-bottom:80px;max-width:600px;margin:0 auto;">

    <!-- CONVERSATIONS VIEW -->
    <div id="conversations-view">
      <div style="padding:20px 16px 12px;">
        <h2 style="font-family:'DM Serif Display',serif;color:#FF8C00;font-size:22px;font-weight:700;margin:0 0 4px;">Messages</h2>
        <p style="font-family:'Cormorant Garamond',serif;font-size:14px;color:#8B6040;margin:0;font-style:italic;">Chat with your friends</p>
      </div>
      <div id="conversations-list" style="padding:0 14px;"></div>
    </div>

    <!-- CHAT VIEW -->
    <div id="chat-view" style="display:none;">
      <!-- Chat header -->
      <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(212,175,55,0.15);position:sticky;top:0;background:#1A0A00;z-index:10;">
        <button onclick="backToConversations()" style="background:transparent;border:1px solid rgba(212,175,55,0.4);border-radius:50%;width:34px;height:34px;color:#FF8C00;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;">←</button>
        <div id="chat-friend-avatar" style="flex-shrink:0;"></div>
        <div id="chat-friend-name" style="font-family:'Cormorant Garamond',serif;color:#F0E8D6;font-size:15px;font-weight:500;flex:1;"></div>
      </div>

      <!-- Messages list -->
      <div id="chat-messages" style="padding:16px 14px;display:flex;flex-direction:column;gap:10px;min-height:300px;"></div>

      <!-- Input -->
      <div style="position:fixed;bottom:64px;left:0;right:0;max-width:600px;margin:0 auto;padding:10px 14px;background:#1A0A00;border-top:1px solid rgba(212,175,55,0.15);display:flex;gap:8px;z-index:20;">
        <input id="chat-input" type="text" class="dark-input" placeholder="Type a message…" style="flex:1;margin:0;" onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="background:linear-gradient(135deg,#F4D06F,#FF8C00,#B8860B);color:#1A0A00;border:none;border-radius:999px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;flex-shrink:0;">Send</button>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <a href="saved.html" class="nav-item" id="nav-saved"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span></a>
    <a href="messages.html" class="nav-item active" id="nav-messages" style="position:relative;"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
    <a href="home.html" class="nav-item" id="nav-home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="organizer.html" class="nav-item" id="nav-organizers"><span class="nav-icon">🎭</span><span class="nav-label">Organizers</span></a>
    <a href="profile.html" class="nav-item" id="nav-profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  <script src="avatars.js"></script>
  <script src="messages.js"></script>
  <script src="nav-badge.js"></script>
</body>
</html>
