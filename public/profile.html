<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background:#0A0912;">
<script>if (!localStorage.getItem('userToken')) { window.location.href = 'auth.html'; }</script>
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F4D06F"/><stop offset="50%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#B8860B"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" stroke="#D4AF37" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="14" fill="url(#goldFill)"/>
            <polygon points="20,8 22.5,15.5 30.5,15.6 24.2,20.4 26.6,28 20,23.8 13.4,28 15.8,20.4 9.5,15.6 17.5,15.5" fill="#0A0912"/>
          </svg>
        </div>
        <span class="logo-text">Buzz</span>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main style="padding-bottom:80px;max-width:600px;margin:0 auto;">

    <!-- HERO BANNER -->
    <div id="profile-hero" style="height:140px;position:relative;background:linear-gradient(135deg,#3A1F6E 0%,#6B2D5C 50%,#1A1040 100%);overflow:hidden;">
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.4;" aria-hidden="true">
        <circle cx="8%" cy="20%" r="1" fill="#F4D06F"/><circle cx="18%" cy="65%" r="1.5" fill="#F4D06F"/>
        <circle cx="30%" cy="15%" r="1" fill="#D4AF37"/><circle cx="45%" cy="75%" r="1" fill="#F4D06F"/>
        <circle cx="58%" cy="30%" r="1.5" fill="#D4AF37"/><circle cx="70%" cy="55%" r="1" fill="#F4D06F"/>
        <circle cx="80%" cy="20%" r="1" fill="#D4AF37"/><circle cx="88%" cy="70%" r="1.5" fill="#F4D06F"/>
        <circle cx="95%" cy="40%" r="1" fill="#D4AF37"/>
      </svg>
    </div>

    <!-- AVATAR + INFO -->
    <div style="text-align:center;padding:0 20px 16px;border-bottom:1px solid rgba(212,175,55,0.15);">
      <div style="position:relative;display:inline-flex;margin-top:-36px;z-index:2;">
        <div id="profile-avatar" style="width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid #0A0912;box-shadow:0 0 0 2px #D4AF37;"></div>
        <div style="position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#D4AF37;color:#0A0912;display:flex;align-items:center;justify-content:center;font-size:9px;">✦</div>
      </div>

      <h2 id="profile-username" style="font-family:'Playfair Display',serif;color:#F0E8D6;font-size:22px;font-weight:700;margin:10px 0 4px;"></h2>
      <p id="profile-bio-display" style="font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#6E6A5F;line-height:1.5;min-height:20px;"></p>

      <!-- STATS ROW -->
      <div style="display:flex;gap:8px;margin:14px 0 12px;">
        <div style="background:#16151F;border-radius:10px;padding:10px;text-align:center;flex:1;">
          <div id="stat-saved" style="font-family:'Playfair Display',serif;color:#D4AF37;font-size:18px;font-weight:700;">—</div>
          <div style="font-size:10px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">saved</div>
        </div>
        <div style="background:#16151F;border-radius:10px;padding:10px;text-align:center;flex:1;">
          <div id="stat-attending" style="font-family:'Playfair Display',serif;color:#D4AF37;font-size:18px;font-weight:700;">—</div>
          <div style="font-size:10px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">attending</div>
        </div>
        <div id="stat-privacy-box" onclick="togglePrivacy()" style="background:#16151F;border-radius:10px;padding:10px;text-align:center;flex:1;cursor:pointer;">
          <div id="stat-privacy" style="font-family:'IBM Plex Sans',sans-serif;color:#D4AF37;font-size:14px;font-weight:600;">—</div>
          <div style="font-size:10px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">visibility</div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:center;">
        <button onclick="openEditModal()" style="background:transparent;border:1px solid rgba(212,175,55,0.45);color:#D4AF37;border-radius:999px;font-size:12px;padding:6px 16px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;">Edit profile</button>
        <button onclick="logout()" style="background:transparent;border:1px solid rgba(232,69,107,0.4);color:#E8456B;border-radius:999px;font-size:12px;padding:6px 16px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;">Log out</button>
      </div>
    </div>

    <!-- FRIEND REQUESTS -->
    <div id="friend-requests-section" style="display:none;padding:0 14px 10px;"></div>

    <!-- PEOPLE SEARCH -->
    <div style="padding:14px 14px 0;">
      <input type="text" id="people-search" class="dark-input" placeholder="Find people…" oninput="handlePeopleSearch(this.value)">
      <div id="search-results" style="margin-top:8px;"></div>
    </div>

    <!-- TABS -->
    <div class="tab-switcher" style="margin-top:16px;">
      <button class="tab-btn active" id="tab-saved-btn" onclick="switchTab('saved')">Saved</button>
      <button class="tab-btn" id="tab-attending-btn" onclick="switchTab('attending')">Attending</button>
    </div>

    <div id="saved-list" class="event-list" style="padding:0;"></div>
    <div id="attending-list" class="event-list" style="padding:0;display:none;"></div>

  </main>

  <!-- EDIT PROFILE MODAL -->
  <div id="edit-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(10,9,18,0.95);align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;">
    <div class="section-box" style="width:100%;max-width:400px;position:relative;margin:20px auto;">
      <svg class="corner-flourish cf-tl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-tr" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-br" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-bl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <p class="section-label" style="margin-bottom:16px;">Edit Profile</p>
      <div class="profile-form">
        <textarea id="edit-bio" class="dark-input" placeholder="Bio (optional)" rows="3" style="resize:vertical;"></textarea>

        <!-- AVATAR PICKER -->
        <p class="section-label" style="margin-bottom:8px;">Choose avatar</p>
        <div id="avatar-picker" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px;"></div>

        <button class="gold-btn" onclick="saveProfile()">Save</button>
        <button onclick="closeEditModal()" style="background:transparent;border:none;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;font-size:14px;cursor:pointer;width:100%;padding:8px;">Cancel</button>
        <p id="edit-error" style="font-size:13px;color:#E8456B;min-height:16px;font-family:'IBM Plex Sans',sans-serif;"></p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="profile.html?tab=saved" class="nav-item" id="nav-saved"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span></a>
    <a href="messages.html" class="nav-item" id="nav-messages" style="position:relative;"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
    <a href="organizer.html" class="nav-item" id="nav-organizers"><span class="nav-icon">🎭</span><span class="nav-label">Organizers</span></a>
    <a href="profile.html" class="nav-item active" id="nav-profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  <script src="avatars.js"></script>
  <script src="profile.js"></script>
</body>
</html>
