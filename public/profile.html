<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background:linear-gradient(160deg,#3D1200 0%,#8B1A00 30%,#1A0A00 70%,#0A0500 100%);min-height:100vh;">
<script>if (!localStorage.getItem('userToken')) { window.location.href = 'auth.html'; }</script>
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="sunFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" fill="url(#sunFill)"/>
            <path d="M20 8L20 32M8 20L32 20M11.5 11.5L28.5 28.5M28.5 11.5L11.5 28.5" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="5" fill="#1A0A00"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">Buzz</span>
          <span class="header-slogan">Find your night</span>
        </div>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main class="page-transition" style="padding-bottom:80px;max-width:600px;margin:0 auto;">

    <!-- AVATAR + INFO -->
    <div style="text-align:center;padding:16px 20px 16px;border-bottom:1px solid rgba(212,175,55,0.15);">
      <div style="position:relative;display:inline-flex;margin-top:20px;z-index:2;">
        <div id="profile-avatar" style="width:72px;height:72px;border-radius:50%;overflow:hidden;box-shadow:0 0 0 3px #FF8C00;"></div>
        <div style="position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#FF8C00;color:#1A0A00;display:flex;align-items:center;justify-content:center;font-size:9px;">✦</div>
      </div>
      <div style="margin-top:6px;">
        <button class="avatar-change-pill" onclick="openAvatarPicker()">✦ Change avatar</button>
      </div>
      <div id="avatar-picker-inline" style="display:none;margin-top:12px;padding:0 10px;">
        <div id="avatar-picker-grid-inline" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;max-width:280px;margin-left:auto;margin-right:auto;"></div>
        <div style="display:flex;gap:10px;justify-content:center;align-items:center;">
          <button onclick="saveAvatarOnly()" style="background:linear-gradient(135deg,#F4D06F,#FF8C00,#B8860B);color:#1A0A00;border:none;border-radius:999px;font-size:12px;padding:8px 20px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-weight:700;">Save avatar</button>
          <span onclick="closeAvatarPicker()" style="font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:#6E6A5F;cursor:pointer;">Cancel</span>
        </div>
      </div>

      <h2 id="profile-username" style="font-family:'Playfair Display',serif;color:#F0E8D6;font-size:22px;font-weight:700;margin:10px 0 4px;"></h2>
      <p id="profile-bio-display" style="font-family:'Cormorant Garamond',serif;font-size:15px;color:#6E6A5F;line-height:1.9;min-height:20px;"></p>

      <!-- STATS ROW -->
      <div style="display:flex;gap:8px;margin:14px 0 12px;">
        <div style="background:#16151F;border-radius:10px;padding:10px;text-align:center;flex:1;">
          <div id="stat-saved" style="font-family:'Playfair Display',serif;color:#FF8C00;font-size:18px;font-weight:700;">—</div>
          <div style="font-size:10px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">saved</div>
        </div>
        <div style="background:#16151F;border-radius:10px;padding:10px;text-align:center;flex:1;">
          <div id="stat-attending" style="font-family:'Playfair Display',serif;color:#FF8C00;font-size:18px;font-weight:700;">—</div>
          <div style="font-size:10px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">attending</div>
        </div>
        <div id="stat-privacy-box" onclick="togglePrivacy()" style="background:#16151F;border-radius:10px;padding:10px;text-align:center;flex:1;cursor:pointer;">
          <div id="stat-privacy" style="font-family:'IBM Plex Sans',sans-serif;color:#FF8C00;font-size:14px;font-weight:600;">—</div>
          <div style="font-size:10px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;text-transform:uppercase;letter-spacing:1px;margin-top:2px;">visibility</div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:center;">
        <button onclick="openEditModal()" style="background:transparent;border:1px solid rgba(212,175,55,0.45);color:#FF8C00;border-radius:999px;font-size:12px;padding:6px 16px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;">Edit profile</button>
        <button onclick="logout()" style="background:transparent;border:1px solid rgba(232,69,107,0.4);color:#E8456B;border-radius:999px;font-size:12px;padding:6px 16px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;">Log out</button>
      </div>
    </div>

    <!-- FRIEND REQUESTS -->
    <div id="friend-requests-section" style="display:none;padding:0 14px 10px;"></div>

    <!-- PEOPLE SEARCH -->
    <div style="padding:14px 14px 0;">
      <input type="text" id="people-search" class="dark-input" placeholder="Find people…" oninput="handlePeopleSearch(this.value)">
      <div id="search-results" style="margin-top:8px;"></div>
    </div>

    <!-- TABS -->
    <div class="tab-switcher" style="margin-top:16px;">
      <button class="tab-btn active" id="tab-saved-btn" onclick="switchTab('saved')">Saved</button>
      <button class="tab-btn" id="tab-attending-btn" onclick="switchTab('attending')">Attending</button>
    </div>

    <div id="saved-list" class="event-list" style="padding:0;"></div>
    <div id="attending-list" class="event-list" style="padding:0;display:none;"></div>

  </main>

  <!-- EDIT PROFILE MODAL -->
  <div id="edit-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(10,9,18,0.95);align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;">
    <div class="section-box" style="width:100%;max-width:400px;position:relative;margin:20px auto;">
      <svg class="corner-flourish cf-tl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <svg class="corner-flourish cf-tr" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <svg class="corner-flourish cf-br" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <svg class="corner-flourish cf-bl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#FF8C00" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#FF8C00"/><circle cx="2" cy="16" r="1.5" fill="#FF8C00"/></svg>
      <p class="section-label" style="margin-bottom:16px;">Edit Profile</p>
      <div class="profile-form">
        <textarea id="edit-bio" class="dark-input" placeholder="Bio (optional)" rows="3" style="resize:vertical;"></textarea>

        <!-- AVATAR PICKER -->
        <p class="section-label" style="margin-bottom:8px;">Choose avatar</p>
        <div id="avatar-picker" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px;"></div>

        <button class="gold-btn" onclick="saveProfile()">Save</button>
        <button onclick="closeEditModal()" style="background:transparent;border:none;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;font-size:14px;cursor:pointer;width:100%;padding:8px;">Cancel</button>
        <p id="edit-error" style="font-size:13px;color:#E8456B;min-height:16px;font-family:'IBM Plex Sans',sans-serif;"></p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="nav-item" id="nav-home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="profile.html?tab=saved" class="nav-item" id="nav-saved"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span></a>
    <a href="messages.html" class="nav-item" id="nav-messages" style="position:relative;"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
    <a href="organizer.html" class="nav-item" id="nav-organizers"><span class="nav-icon">🎭</span><span class="nav-label">Organizers</span></a>
    <a href="profile.html" class="nav-item active" id="nav-profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  <script src="avatars.js"></script>
  <script src="profile.js"></script>
</body>
</html>
