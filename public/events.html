<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SofiaBuzz</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF8C00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Buzz">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script>if (!localStorage.getItem('userToken')) { window.location.href = 'auth.html'; }</script>
  <div class="starfield" aria-hidden="true"></div>
  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="sunFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" fill="url(#sunFill)"/>
            <path d="M20 8L20 32M8 20L32 20M11.5 11.5L28.5 28.5M28.5 11.5L11.5 28.5" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="5" fill="#1A0A00"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">Buzz</span>
          <span class="header-slogan">Find your night</span>
        </div>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>
  <main class="page-transition" style="padding-bottom: 70px;">
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn" data-category="all">🎉 All</button>
    </div>
    <div id="for-you-section" style="display:none;"></div>
    <div id="event-list" class="event-list">
      <p>Loading events...</p>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="saved.html" class="nav-item" id="nav-saved"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span></a>
    <a href="messages.html" class="nav-item" id="nav-messages" style="position:relative;"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
    <a href="home.html" class="nav-item" id="nav-home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="organizer.html" class="nav-item" id="nav-organizers"><span class="nav-icon">🎭</span><span class="nav-label">Organizers</span></a>
    <a href="profile.html" class="nav-item" id="nav-profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
  </nav>

  <script src="app.js"></script>
  <script src="nav-badge.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>

</body>
</html>
