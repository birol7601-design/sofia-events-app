<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Events — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script>if (!localStorage.getItem('userToken')) { window.location.href = 'auth.html'; }</script>
  <div class="starfield" aria-hidden="true"></div>
  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="sunFill" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B35"/><stop offset="50%" stop-color="#FF8C00"/><stop offset="100%" stop-color="#FFD700"/></linearGradient></defs>
            <circle cx="20" cy="20" r="19" fill="url(#sunFill)"/>
            <path d="M20 8L20 32M8 20L32 20M11.5 11.5L28.5 28.5M28.5 11.5L11.5 28.5" stroke="#1A0A00" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="5" fill="#1A0A00"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">Buzz</span>
          <span class="header-slogan">Find your night</span>
        </div>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main style="padding-bottom: 70px;">
    <div style="text-align:center;padding:24px 0 16px;">
      <h1 style="font-family:'DM Serif Display',serif;color:#FF8C00;font-size:24px;font-weight:700;margin-bottom:4px;">Saved Events</h1>
      <p style="font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:#8B6040;">Your saved events</p>
    </div>
    <div id="event-list" class="event-list">
      <p style="text-align:center;color:var(--muted);padding:2rem 0;">Loading…</p>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="profile.html?tab=saved" class="nav-item active" id="nav-saved">
      <span class="nav-icon">🔖</span>
      <span class="nav-label">Saved</span>
    </a>
    <a href="messages.html" class="nav-item" id="nav-messages" style="position:relative;"><span class="nav-icon">💬</span><span class="nav-label">Messages</span></a>
    <a href="organizer.html" class="nav-item" id="nav-organizers">
      <span class="nav-icon">🎭</span>
      <span class="nav-label">Organizers</span>
    </a>
    <a href="profile.html" class="nav-item" id="nav-profile">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </a>
  </nav>

  <script src="saved.js"></script>
</body>
</html>
