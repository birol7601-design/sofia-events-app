<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Events — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="starfield" aria-hidden="true"></div>
  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#F4D06F"/>
                <stop offset="50%" stop-color="#D4AF37"/>
                <stop offset="100%" stop-color="#B8860B"/>
              </linearGradient>
            </defs>
            <circle cx="20" cy="20" r="19" stroke="#D4AF37" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="14" fill="url(#goldFill)"/>
            <polygon points="20,8 22.5,15.5 30.5,15.6 24.2,20.4 26.6,28 20,23.8 13.4,28 15.8,20.4 9.5,15.6 17.5,15.5" fill="#0A0912"/>
          </svg>
        </div>
        <span class="logo-text">Buzz</span>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main style="padding-bottom: 70px;">
    <div style="text-align:center;padding:24px 0 16px;">
      <h1 style="font-family:'Playfair Display',serif;color:#D4AF37;font-size:24px;font-weight:700;margin-bottom:4px;">Saved Events</h1>
      <p style="font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:#6E6A5F;">Your saved events</p>
    </div>
    <div id="event-list" class="event-list">
      <p style="text-align:center;color:var(--muted);padding:2rem 0;">Loading…</p>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="profile.html?tab=saved" class="nav-item active" id="nav-saved">
      <span class="nav-icon">🔖</span>
      <span class="nav-label">Saved</span>
    </a>
    <a href="organizer.html" class="nav-item" id="nav-organizers">
      <span class="nav-icon">🎭</span>
      <span class="nav-label">Organizers</span>
    </a>
    <a href="profile.html" class="nav-item" id="nav-profile">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </a>
  </nav>

  <script src="saved.js"></script>
</body>
</html>
