<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background:#0A0912;">
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#F4D06F"/>
                <stop offset="50%" stop-color="#D4AF37"/>
                <stop offset="100%" stop-color="#B8860B"/>
              </linearGradient>
            </defs>
            <circle cx="20" cy="20" r="19" stroke="#D4AF37" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="14" fill="url(#goldFill)"/>
            <polygon points="20,8 22.5,15.5 30.5,15.6 24.2,20.4 26.6,28 20,23.8 13.4,28 15.8,20.4 9.5,15.6 17.5,15.5" fill="#0A0912"/>
          </svg>
        </div>
        <span class="logo-text">Buzz</span>
        <span class="header-slogan">Find your night</span>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>

  <main style="padding-bottom:70px;max-width:600px;margin:0 auto;padding-left:14px;padding-right:14px;padding-top:1rem;">

    <!-- WELCOME -->
    <div style="text-align:center;padding:28px 0 24px;">
      <h1 style="font-family:'Playfair Display',serif;color:#D4AF37;font-size:28px;font-weight:700;margin-bottom:6px;">Welcome</h1>
      <p style="font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#6E6A5F;">Join Sofia's events community</p>
    </div>

    <!-- TAB SWITCHER -->
    <div class="auth-tab-underline">
      <button class="auth-tab-btn active" id="tab-login" onclick="showTab('login')">Log in</button>
      <button class="auth-tab-btn" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="section-box">
      <svg class="corner-flourish cf-tl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-tr" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-br" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-bl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <div class="profile-form">
        <input type="email" id="login-email" class="dark-input" placeholder="Email">
        <div style="position:relative;">
          <input type="password" id="login-password" class="dark-input" placeholder="Password" style="padding-right:40px;">
          <button type="button" onclick="togglePw('login-password','login-eye')" id="login-eye" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#D4AF37;cursor:pointer;font-size:16px;padding:0;line-height:1;">👁</button>
        </div>
        <button class="gold-btn" id="login-btn">Log in</button>
        <p id="login-error" style="font-size:13px;color:#E8456B;min-height:18px;font-family:'IBM Plex Sans',sans-serif;"></p>
        <p style="text-align:center;font-size:13px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;">Don't have an account? <a href="#" onclick="showTab('register');return false;" style="color:#D4AF37;text-decoration:none;">Register →</a></p>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" class="section-box" style="display:none;">
      <svg class="corner-flourish cf-tl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-tr" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-br" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <svg class="corner-flourish cf-bl" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2 16 C2 8, 8 2, 16 2" stroke="#D4AF37" stroke-width="1.5" fill="none"/><circle cx="16" cy="2" r="1.5" fill="#D4AF37"/><circle cx="2" cy="16" r="1.5" fill="#D4AF37"/></svg>
      <div class="profile-form">
        <input type="text" id="reg-username" class="dark-input" placeholder="Username (min 3 chars)">
        <input type="email" id="reg-email" class="dark-input" placeholder="Email">
        <div style="position:relative;">
          <input type="password" id="reg-password" class="dark-input" placeholder="Password" style="padding-right:40px;">
          <button type="button" onclick="togglePw('reg-password','reg-eye')" id="reg-eye" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#D4AF37;cursor:pointer;font-size:16px;padding:0;line-height:1;">👁</button>
        </div>
        <div style="position:relative;">
          <input type="password" id="reg-confirm" class="dark-input" placeholder="Confirm password" style="padding-right:40px;">
          <button type="button" onclick="togglePw('reg-confirm','reg-confirm-eye')" id="reg-confirm-eye" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#D4AF37;cursor:pointer;font-size:16px;padding:0;line-height:1;">👁</button>
        </div>

        <!-- EMAIL CONSENT -->
        <div style="display:flex;align-items:flex-start;gap:10px;margin:4px 0;">
          <input type="checkbox" id="email-consent" style="margin-top:3px;accent-color:#D4AF37;flex-shrink:0;">
          <label for="email-consent" style="font-size:12px;color:#B5AE9D;line-height:1.5;font-family:'IBM Plex Sans',sans-serif;">I agree to receive event recommendations and updates from SofiaBuzz at sofiabuzzed@gmail.com. You can unsubscribe anytime.</label>
        </div>

        <!-- PRIVACY CONSENT -->
        <div style="display:flex;align-items:flex-start;gap:10px;margin:4px 0;">
          <input type="checkbox" id="privacy-consent" style="margin-top:3px;accent-color:#D4AF37;flex-shrink:0;">
          <label for="privacy-consent" style="font-size:12px;color:#B5AE9D;line-height:1.5;font-family:'IBM Plex Sans',sans-serif;">I have read and agree to the <a href="privacy.html" target="_blank" style="color:#D4AF37;text-decoration:underline;">Privacy Policy</a>. (Required)</label>
        </div>

        <button class="gold-btn" id="register-btn">Create account</button>
        <p id="register-error" style="font-size:13px;color:#E8456B;min-height:18px;font-family:'IBM Plex Sans',sans-serif;"></p>
        <p style="text-align:center;font-size:13px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;">Already have an account? <a href="#" onclick="showTab('login');return false;" style="color:#D4AF37;text-decoration:none;">Log in →</a></p>
      </div>
    </div>

    <!-- SOCIAL DIVIDER -->
    <div style="display:flex;align-items:center;gap:12px;margin:20px 14px;">
      <div style="flex:1;height:1px;background:#2A2736;"></div>
      <span style="font-size:11px;color:#6E6A5F;font-family:'IBM Plex Sans',sans-serif;white-space:nowrap;">Coming soon</span>
      <div style="flex:1;height:1px;background:#2A2736;"></div>
    </div>

    <div style="margin:0 14px;">
      <button disabled style="width:100%;background:transparent;border:1px solid #2A2736;color:#6E6A5F;border-radius:999px;padding:12px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;cursor:not-allowed;">Continue with Google</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="profile.html?tab=saved" class="nav-item" id="nav-saved">
      <span class="nav-icon">🔖</span>
      <span class="nav-label">Saved</span>
    </a>
    <a href="organizer.html" class="nav-item" id="nav-organizers">
      <span class="nav-icon">🎭</span>
      <span class="nav-label">Organizers</span>
    </a>
    <a href="profile.html" class="nav-item active" id="nav-profile">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </a>
  </nav>

  <script src="auth.js"></script>
</body>
</html>
