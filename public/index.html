<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SofiaBuzz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="starfield" aria-hidden="true"></div>
  <header>
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-circle">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="19" stroke="#D4AF37" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="14" fill="#D4AF37"/>
            <polygon points="20,8 22.5,15.5 30.5,15.6 24.2,20.4 26.6,28 20,23.8 13.4,28 15.8,20.4 9.5,15.6 17.5,15.5" fill="#14131C"/>
          </svg>
        </div>
        <span class="logo-text">Buzz</span>
      </div>
      <span class="header-city">Sofia</span>
    </div>
  </header>
  <main>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn" data-category="all">🎉 All</button>
    </div>
    <div id="event-list" class="event-list">
      <p>Loading events...</p>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
